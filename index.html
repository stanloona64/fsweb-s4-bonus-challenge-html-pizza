<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./workintech.svg" />
    <link rel="stylesheet" href="./style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workintech + 🍕</title>
  </head>

  <body>
  <!-- Header Bölümü -->
    <header>
      <div>
        <h3>Teknolojik Yemekler</h3>
        <p>fırsatı kaçırma</p>
        <h1>KOD ACIKTIRIR</h1>
        <h1>PİZZA, DOYURUR</h1>
        <button>ACIKTIM</button>
      </div>
    </header>

    <main>
      <!-- Üst Menü Formu (Kore, Pizza, Burger vb.) -->
      <section id="category-selection">
        <form id="filter-form">
          <div class="category-buttons">
            <button type="button">YENİ! Kore</button>
            <button type="button">Pizza</button>
            <button type="button">Burger</button>
            <button type="button">Kızartmalar</button>
            <button type="button">Fast Food</button>
            <button type="button">Gazlı İçecek</button>
          </div>
        </form>
      </section>

      <!-- Benzer Lezzetler/Kartlar Bölümü -->
      <section id="menu-items">
        <h2>Acıktıran Kodlara Doyuran Lezzetler</h2>
        <div class="product-grid">
          <!-- Buraya pizza/burger kartlarını div olarak ekleyebilirsin -->
          <div class="card">Terminal Pizza</div>
          <div class="card">Position Absolute Acı Pizza</div>
          <div class="card">useEffect Tavuklu Burger</div>
        </div>
      </section>
    </main>

    <!-- Footer Bölümü -->
    <footer>
      <div class="footer-content">
        <h3>Teknolojik Yemekler</h3>
        <p>Adres bilgileri ve iletişim...</p>
      </div>
    </footer>
  </body>

</html>
